<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Alganize — Algal Gene Expression Explorer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>

/* ================= THEME ================= */
:root {
  --bg:#0e1a0e; 
  --bg2:#f7faf7; 
  --surface:#ffffff; 
  --surface2:#f1f6f1;

  --border:rgba(34,139,34,0.12); 
  --border2:rgba(34,139,34,0.25);

  --text:#1f2a1f; 
  --text2:#4f6b4f; 
  --text3:#7a8f7a;

  --accent:#2e7d32;
  --accent2:#66bb6a;

  --up:#2e7d32; 
  --down:#c62828;

  --font:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font);
  font-size:14px;
  line-height:1.6;
  min-height:100vh;
}

/* ================= NAV ================= */
nav{
  background:#ffffff;
  border-bottom:1px solid var(--border);
  padding:0 24px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  height:52px;
  position:sticky;
  top:0;
  z-index:100;
  box-shadow:0 2px 6px rgba(0,0,0,0.04);
}

.nav-logo{
  display:flex;
  align-items:center;
}

.logo-img{
  height:48px;
}

.nav-links{display:flex;gap:4px;}

.nav-link{
  padding:5px 12px;
  border-radius:6px;
  color:var(--text2);
  font-size:13px;
  cursor:pointer;
  border:none;
  background:none;
  transition:.15s;
}

.nav-link:hover{
  background:#eef6ee;
}

.nav-link.active{
  background:#e4f3e4;
  color:var(--accent);
}

/* ================= LAYOUT ================= */
.app{display:flex;height:calc(100vh - 52px);}

/* ================= SIDEBAR ================= */
aside{
  width:256px;
  background:#fafdfa;
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  overflow-y:auto;
  padding:14px 12px;
  gap:8px;
}

.filter-block{
  background:#ffffff;
  border:1px solid var(--border);
  border-radius:8px;
  padding:10px 12px;
}

.filter-label{
  font-size:10px;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--text3);
  margin-bottom:7px;
  display:flex;
  align-items:center;
  gap:6px;
}

.step-badge{
  width:16px;height:16px;
  border-radius:50%;
  background:var(--accent);
  color:#fff;
  font-size:9px;
  display:flex;align-items:center;justify-content:center;
}

select{
  width:100%;
  background:#fff;
  border:1px solid var(--border2);
  border-radius:6px;
  padding:6px 10px;
  color:var(--text);
  font-size:12px;
}

.sidebar-divider{
  border:none;
  border-top:1px solid var(--border);
}

.pathway-btn{
  width:100%;
  text-align:left;
  padding:6px 10px;
  border-radius:6px;
  border:none;
  background:none;
  color:var(--text2);
  font-size:12px;
  cursor:pointer;
}

.pathway-btn:hover{background:#f1f6f1;}
.pathway-btn.active{
  background:#e4f3e4;
  color:var(--accent);
}

/* ================= MAIN ================= */
main{
  flex:1;
  overflow-y:auto;
  padding:22px;
  display:flex;
  flex-direction:column;
  gap:18px;
}

/* ================= CARDS ================= */
.panel,
.stat-card,
.dataset-header{
  background:#ffffff;
  border:1px solid var(--border);
  border-radius:10px;
  padding:16px;
}

.stat-row{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

/* ================= TABLE ================= */
.gene-table{
  width:100%;
  border-collapse:collapse;
}

.gene-table td,
.gene-table th{
  padding:7px 10px;
  border-bottom:1px solid var(--border);
}

.gene-table tr:hover td{
  background:#f3f8f3;
}

/* ================= ABOUT ================= */
#page-about{
  padding:40px;
  max-width:720px;
  margin:0 auto;
}

</style>
</head>

<body>

<!-- ================= NAV ================= -->
<nav>
  <div class="nav-logo">
    <img src="images/alganize-logo-black.svg" alt="Alganize" class="logo-img"/>
  </div>

  <div class="nav-links">
    <button class="nav-link active" onclick="showPage('explorer')">Explorer</button>
    <button class="nav-link" onclick="showPage('about')">About</button>
  </div>
</nav>

<!-- ================= EXPLORER ================= -->
<div class="app" id="page-explorer">

  <aside>
    <div class="filter-block">
      <div class="filter-label"><span class="step-badge">1</span>Species</div>
      <select id="sel-species"></select>
    </div>

    <div class="filter-block">
      <div class="filter-label"><span class="step-badge">2</span>Induction</div>
      <select id="sel-induction"></select>
    </div>

    <div class="filter-block">
      <div class="filter-label"><span class="step-badge">3</span>Dataset</div>
      <select id="sel-dataset"></select>
    </div>

    <div class="filter-block">
      <div class="filter-label"><span class="step-badge">4</span>Contrast</div>
      <select id="sel-contrast"></select>
    </div>
  </aside>

  <main>
    <div class="panel">Your dashboard content remains unchanged</div>
  </main>
</div>

<!-- ================= ABOUT ================= -->
<div id="page-about" style="display:none;">
  <h2 style="color:var(--accent);margin-bottom:12px;">About</h2>
  <p style="color:var(--text2);">(Work in progress)</p>
</div>

<script>

/* ================= PAGE SWITCH ================= */
function showPage(page){
  document.getElementById('page-explorer').style.display = page==='explorer'?'flex':'none';
  document.getElementById('page-about').style.display = page==='about'?'block':'none';

  document.querySelectorAll('.nav-link').forEach((b,i)=>{
    b.classList.toggle('active',
      (i===0 && page==='explorer') ||
      (i===1 && page==='about')
    );
  });
}

</script>

</body>
</html>
